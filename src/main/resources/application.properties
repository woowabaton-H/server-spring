spring.application.name=server-spring

# H2 (in-memory)
spring.datasource.url=jdbc:h2:mem:cleanloop;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# schema.sql -> data.sql 순서로 실행
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Jackson 3는 날짜를 기본으로 ISO-8601 문자열로 직렬화하므로 별도 설정을 두지 않는다.

# 인증 없이 고정 데모 사용자 컨텍스트로 동작한다
cleanloop.demo-user-id=a0000000-0000-0000-0000-000000000001

# 프론트엔드 origin 허용 목록. Railway에서는 CLEANLOOP_CORS_ALLOWED_ORIGINS로 덮어쓸 수 있다.
cleanloop.cors.allowed-origins=${CLEANLOOP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,https://binuu.vercel.app}
